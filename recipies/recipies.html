<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="A place to find all sorts of new recipies!">
    <meta property="og:url" content="https://willkjj.github.io/wdd131/recipies/recipies.html">
    <meta property="og:image" content="./images/recipe-book.png">

    <!-- X Card -->
    <meta name="twitter:card" content="./images/recipe-book.png">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="A place to find all sorts of new recipies!">
    <meta name="twitter:image" content="./images/recipe-book.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="./favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="./images/recipe-book.png">
                
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipieBook</title>
    <link rel="stylesheet" href="recipies.css">
</head>
<body>
    <div class="logo">
        <img src="./images/recipe-book.png" alt="recipe-book's logo">
        <h1>RecipeBook</h1>
    </div>
    <div class="searchBar">
        <input class="searchInput" type="text" placeholder="Find a recipe">
        <img class="searchIcon" src="./images/search.svg" alt="click here to search">
    </div>
    <div class="cardContainer">
        <div class="recipe">
            <div class="imageContainer">
                <img src="./images/apple-crisp.jpg" alt="picture of an apple crisp">
                <p class="mealGenre">Desert</p>
            </div>
            <div class="recipeInfo">
                <h2>Apple Crisp</h2>
                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>    
                <p class="recipeDescription">This apple crisp recipe is a simple yet delicious fall desert that's great served warm with vanilla ice cream</p>          
            </div>
        </div>
    </div>
    <footer>
        
        <div class="socialMediaIcons">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                   
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>  
    </footer>
</body>
</html>
